<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>HTML5 Video Example</title>

<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<div class="video-container">
    <h1>HTML5 Video Player</h1>

    <video controls poster="images/poster.jpg">

    <source src="assets/mp3/hudson-shelter-falls.mp4" type="video/mp4">
    <source src="assets/mp3/hudson-shelter-falls.webm" type="video/webm">
    <source src="assets/mp3/hudson-shelter-falls.ogv" type="video/ogg">

    Your browser does not support the video tag.
</video>

    <p>This is a basic HTML5 video implementation using the <code>&lt;video&gt;</code> element.</p>
</div>

</body>
</html>
